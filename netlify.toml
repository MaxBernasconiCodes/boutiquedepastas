[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API: no redirigir las Netlify Functions
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA: el resto de rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
